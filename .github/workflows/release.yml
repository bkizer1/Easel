name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'
  NPM_VERSION: '10'

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    permissions:
      id-token: write
      attestations: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # Code signing is OPTIONAL (see docs/SIGNING.md). It activates only when the
      # matching cert secret exists. We must NOT define CSC_LINK at all in the
      # unsigned path — an empty-but-defined CSC_LINK makes electron-builder try
      # (and fail) to sign. GitHub Actions can't conditionally omit an `env:` key,
      # so we write the signing vars into $GITHUB_ENV from this conditional step.
      - name: Configure code signing
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "$PLATFORM" = "macos" ] && [ -n "$MAC_CSC_LINK" ]; then
            echo "macOS cert present — signing + notarizing."
            {
              echo "CSC_LINK=$MAC_CSC_LINK"
              echo "CSC_KEY_PASSWORD=$MAC_CSC_KEY_PASSWORD"
              echo "CSC_IDENTITY_AUTO_DISCOVERY=true"
              echo "APPLE_ID=$APPLE_ID"
              echo "APPLE_APP_SPECIFIC_PASSWORD=$APPLE_APP_SPECIFIC_PASSWORD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
          elif [ "$PLATFORM" = "windows" ] && [ -n "$WIN_CSC_LINK" ]; then
            echo "Windows cert present — signing."
            {
              echo "CSC_LINK=$WIN_CSC_LINK"
              echo "CSC_KEY_PASSWORD=$WIN_CSC_KEY_PASSWORD"
            } >> "$GITHUB_ENV"
          else
            echo "No signing cert for $PLATFORM — building unsigned."
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi

      - name: Build and package
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM
        run: npm run sbom
        continue-on-error: true

      # Attestations are best-effort (may be unavailable on some private-repo
      # plans); never let them block the installer upload below.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        continue-on-error: true
        with:
          subject-path: dist/*

      - name: Attest SBOM
        uses: actions/attest-build-provenance@v1
        continue-on-error: true
        with:
          subject-path: sbom.cdx.json

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            sbom.cdx.json
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sbom-only:
    name: Generate & Verify SBOM
    runs-on: ubuntu-latest
    needs: build-and-release
    # Run even if a build leg failed, so SBOM verification isn't skipped.
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate SBOM (verification)
        run: npm run sbom

      - name: Validate CycloneDX format
        run: |
          if ! jq empty sbom.cdx.json 2>/dev/null; then
            echo "SBOM is not valid JSON"
            exit 1
          fi
          if ! jq -e '.metadata' sbom.cdx.json > /dev/null; then
            echo "SBOM missing required metadata"
            exit 1
          fi
          echo "SBOM validation successful"

      - name: Upload SBOM for verification
        uses: actions/upload-artifact@v4
        with:
          name: sbom-verification
          path: sbom.cdx.json
